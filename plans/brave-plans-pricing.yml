name: Brave API Plans and Pricing
description: Pricing plans for the Brave Search API and Brave Ads API
url: https://brave.com/search/api/
plans:

  - name: Search
    description: Pay-as-you-go web search results from Brave's independent index of over 30 billion pages
    url: https://brave.com/search/api/
    price: 5.00
    unit: per 1,000 requests
    credit:
      amount: 5.00
      period: monthly
    rate_limit:
      requests_per_second: 50
    features:
      - Web, image, video, news, suggestions, and spellcheck endpoints
      - Custom reranking via Goggles
      - Schema-enriched results for LLM/AI applications
      - Up to 5 extra snippets per result
      - Country and language targeting

  - name: Answers
    description: Citation-grounded AI completions powered by Brave Search with OpenAI SDK compatibility
    url: https://brave.com/search/api/
    price: 4.00
    unit: per 1,000 requests
    token_price: 5.00
    token_unit: per 1,000,000 tokens
    credit:
      amount: 5.00
      period: monthly
    rate_limit:
      requests_per_second: 2
    features:
      - OpenAI chat completions compatible surface
      - Streaming support
      - Citation-grounded responses
      - Reduces AI hallucinations with real-time web data

  - name: Spellcheck and Autosuggest
    description: Standalone spellcheck and autosuggest endpoints
    url: https://brave.com/search/api/
    price: 5.00
    unit: per 10,000 requests
    features:
      - Autosuggest endpoint
      - Spellcheck endpoint

  - name: Enterprise
    description: Custom plan with zero data retention, custom agreements, and premium support
    url: https://brave.com/search/api/
    price: custom
    features:
      - Zero Data Retention
      - NDAs and custom legal agreements
      - Invoicing
      - Premium support
      - Dedicated account management
